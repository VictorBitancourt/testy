services:
  testy:
    build: .
    platform: linux/amd64
    image: testy:latest
    ports:
      - "3000:80"
    environment:
      SOLID_QUEUE_IN_PUMA: "true"
      HTTP_PORT: "80"
      FORCE_SSL: "false"
      ASSUME_SSL: "false"
      GEMINI_API_KEY: "${GEMINI_API_KEY:-}"  # Optional: pass via GEMINI_API_KEY=key docker compose up -d
    volumes:
      - testy_storage:/rails/storage
    restart: unless-stopped

volumes:
  testy_storage:
