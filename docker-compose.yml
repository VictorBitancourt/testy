services:
  testy:
    build: .
    platform: linux/amd64
    image: testy:latest
    ports:
      - "3000:80"
    environment:
      SOLID_QUEUE_IN_PUMA: "true"
      # GEMINI_API_KEY: "your_key_here"  # Optional: enables AI scenario generation
    volumes:
      - testy_storage:/rails/storage
    restart: unless-stopped

volumes:
  testy_storage:
